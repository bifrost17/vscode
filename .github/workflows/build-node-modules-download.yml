name: Build node_modules (download)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and package node_modules
    runs-on: ubuntu-22.04
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system build tools
        run: |
          sudo apt update -y
          sudo apt install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev libsecret-1-dev

      - name: Install build/ dependencies
        working-directory: build
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "npm ci failed after 5 attempts" >&2
              exit 1
            fi
            echo "npm ci failed attempt $i, retrying..."
            sleep 2
          done

      - name: Install root dependencies
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "npm ci failed after 5 attempts" >&2
              exit 1
            fi
            echo "npm ci failed attempt $i, retrying..."
            sleep 2
          done
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          VSCODE_ARCH: ${{ env.VSCODE_ARCH }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: List all node_modules files
        run: |
          set -e
          mkdir -p .build
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          wc -l .build/node_modules_list.txt
          du -sh node_modules build/node_modules extensions/*/node_modules 2>/dev/null || true

      - name: Create combined node_modules archive
        run: |
          set -e
          tar -czf all-node_modules.tar.gz --files-from .build/node_modules_list.txt
          ls -lh all-node_modules.tar.gz

      - name: Upload combined node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-node_modules
          path: all-node_modules.tar.gz
          retention-days: 7
          if-no-files-found: error
          compression-level: 0
